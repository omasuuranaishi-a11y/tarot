<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>三枚引きタロット ─ 78枚フルデッキ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night-top:#05041a;
    --night-mid:#110b31;
    --night-low:#211244;
    --felt:#1b0e3c;
    --felt-deep:#110929;
    --gold:#c9a35a;
    --gold-hi:#ead088;
    --gold-dim:rgba(201,163,90,.42);
    --ink:#ece6d8;
    --ink-dim:rgba(236,230,216,.6);
    --lavender:#b3a0e0;
    --lav-glow:rgba(179,160,224,.55);
    --sheet-bg:#0f0a24;
    --slot-w:clamp(66px, 19vw, 96px);
    --fan-w:clamp(44px, 12.5vw, 62px);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--night-top);
    color:var(--ink);
    font-family:'Noto Serif JP', serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  button{font-family:inherit;}

  /* ═══════ 舞台 ═══════ */
  #stage{
    position:fixed;inset:0;overflow:hidden;
    background:
      radial-gradient(ellipse 130% 62% at 50% 112%, var(--night-low) 0%, transparent 60%),
      linear-gradient(to bottom, var(--night-top) 0%, var(--night-mid) 55%, var(--night-low) 100%);
  }
  #stars{position:absolute;inset:0;pointer-events:none;}
  .star{
    position:absolute;border-radius:50%;background:#fff;
    animation:twinkle var(--tw,4s) ease-in-out var(--td,0s) infinite;
  }
  @keyframes twinkle{0%,100%{opacity:var(--o1,.12);}50%{opacity:var(--o2,.75);}}

  .house{
    position:absolute;top:calc(12px + env(safe-area-inset-top));left:0;right:0;
    text-align:center;pointer-events:none;z-index:6;
    font-family:'Cormorant Garamond',serif;
    font-size:10.5px;letter-spacing:.5em;text-indent:.5em;
    color:var(--gold-dim);
  }

  #ribbon{
    position:absolute;top:calc(34px + env(safe-area-inset-top));left:50%;
    transform:translateX(-50%);
    max-width:92vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    padding:8px 20px;border-radius:999px;
    border:1px solid var(--gold-dim);
    background:rgba(8,6,24,.62);
    font-size:12px;letter-spacing:.12em;color:var(--ink);
    opacity:0;transition:opacity .8s ease;
    pointer-events:none;z-index:6;
  }
  #ribbon.show{opacity:1;}

  /* ── ディーラーの気配 ── */
  #dealer{
    position:absolute;left:50%;top:9%;
    width:min(46vw,220px);aspect-ratio:1/1.05;
    transform:translateX(-50%);
    z-index:1;pointer-events:none;
    opacity:.9;
    animation:dealerSway 9s ease-in-out infinite;
  }
  @keyframes dealerSway{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(5px);}
  }
  .d-hood{
    position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:44%;aspect-ratio:1/1.16;
    background:radial-gradient(ellipse at 50% 38%, #251a4e 0%, #170f36 55%, #0d0824 100%);
    border-radius:50% 50% 46% 46% / 62% 62% 40% 40%;
    box-shadow:inset 0 -12px 22px rgba(0,0,0,.65), 0 0 34px rgba(120,90,200,.14);
  }
  .d-hood::after{ /* 顔の闇 */
    content:"";position:absolute;left:50%;top:34%;transform:translateX(-50%);
    width:58%;height:46%;border-radius:50%;
    background:radial-gradient(ellipse at 50% 45%, #030210 0%, transparent 78%);
  }
  .d-body{
    position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:100%;height:58%;
    background:radial-gradient(ellipse at 50% 0%, #221749 0%, #150e33 52%, transparent 88%);
    border-radius:48% 48% 30% 30% / 90% 90% 20% 20%;
  }

  /* ── 円卓 ── */
  #tableWrap{
    position:absolute;left:50%;bottom:-26vh;
    width:165vw;max-width:1020px;aspect-ratio:2/1;
    transform:translateX(-50%);
    z-index:2;
  }
  .table-rim{
    position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(234,208,136,.15), transparent 55%),
      radial-gradient(ellipse at 50% 45%, var(--felt) 0%, var(--felt-deep) 74%, #0a0620 100%);
    border:2px solid rgba(201,163,90,.55);
    box-shadow:
      0 0 0 6px rgba(201,163,90,.06),
      0 0 52px rgba(120,90,200,.2),
      inset 0 0 80px rgba(0,0,0,.55);
  }
  .table-rim::before{
    content:"";position:absolute;inset:5%;border-radius:50%;
    border:1px solid rgba(201,163,90,.26);
  }
  .candle{
    position:absolute;top:13%;
    width:7px;height:7px;border-radius:50%;
    background:var(--gold-hi);
    box-shadow:0 0 14px 5px rgba(234,208,136,.5), 0 0 44px 18px rgba(234,208,136,.13);
    animation:flicker 3.4s ease-in-out infinite;
  }
  .candle.left{left:11%;}
  .candle.right{right:11%;animation-delay:-1.6s;}
  @keyframes flicker{0%,100%{opacity:.85;}42%{opacity:.58;}68%{opacity:.95;}}

  /* ── 山札の扇（テーブル上） ── */
  #fan{
    position:absolute;left:50%;bottom:9vh;
    width:0;z-index:3;
  }
  .fan-card{
    position:absolute;left:0;bottom:0;
    width:var(--fan-w);aspect-ratio:5/8;
    transform:
      translateX(-50%)
      rotate(var(--a))
      translateY(calc(var(--r) * -1));
    transform-origin:50% 260%;
    border-radius:7px;
    border:1px solid rgba(201,163,90,.55);
    background:
      radial-gradient(circle at 50% 28%, rgba(179,160,224,.26), transparent 60%),
      linear-gradient(160deg, #392370 0%, #231a5c 48%, #131f56 100%);
    box-shadow:0 5px 16px rgba(0,0,0,.5);
    cursor:pointer;
    opacity:0;
    transition:transform .45s ease, box-shadow .45s ease, opacity .7s ease;
    -webkit-tap-highlight-color:transparent;
    display:flex;align-items:center;justify-content:center;
  }
  .fan-card::after{
    content:"☽";font-size:calc(var(--fan-w)*.3);
    color:rgba(234,208,136,.8);
    text-shadow:0 0 10px rgba(234,208,136,.4);
  }
  .fan-card.in{opacity:1;}
  .fan-card.picked{
    box-shadow:0 0 18px 5px var(--lav-glow), 0 5px 16px rgba(0,0,0,.5);
    border-color:var(--lavender);
    transform:translateX(-50%) rotate(var(--a)) translateY(calc(var(--r) * -1 - 16px));
    pointer-events:none;
  }
  .fan-card.gone{opacity:0;pointer-events:none;}

  /* ── 上部スロット（過去・現在・未来） ── */
  #slots{
    position:absolute;left:50%;top:calc(15% + 20px);
    transform:translateX(-50%);
    display:flex;gap:calc(var(--slot-w)*.22);
    z-index:4;
  }
  .slot{
    width:var(--slot-w);
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .slot .frame{
    width:100%;aspect-ratio:5/8;position:relative;
    border-radius:9px;
    border:1px dashed rgba(201,163,90,.28);
    transition:border-color .6s;
  }
  .slot.filled .frame{border-color:transparent;}
  .slot .pos-label{text-align:center;opacity:.85;}
  .pos-label .jp{font-size:11px;letter-spacing:.28em;text-indent:.28em;color:var(--ink-dim);display:block;}
  .pos-label .en{
    font-family:'Cormorant Garamond',serif;font-size:8.5px;
    letter-spacing:.32em;text-indent:.32em;color:var(--gold-dim);
    text-transform:uppercase;display:block;margin-top:2px;
  }

  .card{
    position:absolute;inset:0;
    perspective:800px;
    opacity:0;transform:translateY(28vh) scale(.7);
    -webkit-tap-highlight-color:transparent;
    cursor:pointer;
  }
  .card.landed{
    opacity:1;transform:none;
    transition:transform .9s cubic-bezier(.22,.9,.32,1), opacity .7s ease;
  }
  .card-inner{
    position:absolute;inset:0;
    transform-style:preserve-3d;
    transition:transform .95s cubic-bezier(.4,.1,.2,1);
  }
  .card.open .card-inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;border-radius:9px;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid rgba(201,163,90,.65);
    box-shadow:0 8px 24px rgba(0,0,0,.5);
    overflow:hidden;
  }
  .face.back{
    background:
      radial-gradient(circle at 50% 30%, rgba(179,160,224,.28), transparent 58%),
      linear-gradient(160deg, #3a2470 0%, #241a5e 46%, #14225c 100%);
    display:flex;align-items:center;justify-content:center;
  }
  .face.back::before{
    content:"";position:absolute;inset:5px;border-radius:6px;
    border:1px solid rgba(234,208,136,.4);
  }
  .back-moon{
    font-size:calc(var(--slot-w)*.3);color:var(--gold-hi);
    text-shadow:0 0 14px rgba(234,208,136,.45);
  }
  .face.front{
    transform:rotateY(180deg);
    background:
      radial-gradient(circle at 50% 18%, rgba(234,208,136,.14), transparent 55%),
      linear-gradient(170deg, #241847 0%, #170f33 60%, #0f0a26 100%);
    display:flex;align-items:center;justify-content:center;
    padding:8px 4px;text-align:center;
  }
  .face.front::before{
    content:"";position:absolute;inset:5px;border-radius:6px;
    border:1px solid rgba(201,163,90,.35);
  }
  .card.rev .front-body{transform:rotate(180deg);}
  .front-body{display:flex;flex-direction:column;align-items:center;gap:calc(var(--slot-w)*.055);}
  .front-num{
    font-family:'Cormorant Garamond',serif;
    font-size:calc(var(--slot-w)*.15);letter-spacing:.12em;text-indent:.12em;
    color:var(--gold);
  }
  .front-symbol{
    font-size:calc(var(--slot-w)*.27);line-height:1;color:var(--lavender);
    filter:drop-shadow(0 0 8px rgba(179,160,224,.4));
  }
  .front-name{
    font-size:calc(var(--slot-w)*.115);font-weight:600;
    letter-spacing:.06em;color:var(--ink);
    line-height:1.4;
  }

  /* ── 導入 ── */
  #intro{
    position:absolute;inset:0;z-index:20;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;padding:28px;text-align:center;
    background:rgba(4,3,14,.6);
    backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
    cursor:pointer;transition:opacity 1.1s ease;
  }
  #intro.hide{opacity:0;pointer-events:none;}
  #intro .en-title{
    font-family:'Cormorant Garamond',serif;
    font-size:11.5px;letter-spacing:.44em;text-indent:.44em;
    color:var(--gold);text-transform:uppercase;
  }
  #intro h1{
    margin-top:12px;
    font-size:clamp(20px,6vw,27px);font-weight:500;
    letter-spacing:.26em;text-indent:.26em;
  }
  #intro p{font-size:12.5px;line-height:2.1;color:var(--ink-dim);letter-spacing:.05em;}
  #intro .tap{
    margin-top:6px;
    font-size:12px;letter-spacing:.28em;text-indent:.28em;
    color:var(--gold-hi);
    border:1px solid var(--gold-dim);border-radius:999px;
    padding:11px 34px;
    animation:breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.6;}50%{opacity:1;}}

  /* ═══════ 鑑定シート ═══════ */
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    max-height:78dvh;
    background:var(--sheet-bg);
    border-top:1px solid rgba(201,163,90,.4);
    border-radius:18px 18px 0 0;
    box-shadow:0 -14px 50px rgba(0,0,0,.6);
    transform:translateY(102%);
    transition:transform .8s cubic-bezier(.3,.9,.3,1);
    display:flex;flex-direction:column;
  }
  #sheet.show{transform:translateY(0);}
  .sheet-handle{
    flex:none;padding:12px 0 8px;text-align:center;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .sheet-handle::before{
    content:"";display:inline-block;width:42px;height:4px;border-radius:2px;
    background:rgba(201,163,90,.45);
  }
  .sheet-body{
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:4px 20px calc(34px + env(safe-area-inset-bottom));
  }
  .sheet-inner{max-width:620px;margin:0 auto;}
  .sheet-head{text-align:center;margin:6px 0 22px;}
  .sheet-head .en{
    font-family:'Cormorant Garamond',serif;font-size:10.5px;
    letter-spacing:.42em;text-indent:.42em;color:var(--gold);
  }
  .sheet-head h2{
    margin-top:7px;font-size:16px;font-weight:500;
    letter-spacing:.22em;text-indent:.22em;
  }

  .reading{
    border:1px solid rgba(201,163,90,.28);
    border-radius:12px;
    background:rgba(255,255,255,.024);
    padding:18px 16px 20px;
    margin-bottom:16px;
  }
  .r-pos{
    display:flex;align-items:baseline;gap:10px;
    padding-bottom:9px;margin-bottom:12px;
    border-bottom:1px dashed rgba(201,163,90,.3);
  }
  .r-pos .jp{font-size:12px;letter-spacing:.24em;color:var(--lavender);}
  .r-pos .en{
    font-family:'Cormorant Garamond',serif;font-size:9.5px;
    letter-spacing:.3em;color:var(--gold-dim);text-transform:uppercase;
  }
  .r-name{
    font-size:16px;font-weight:600;letter-spacing:.06em;
    color:var(--gold-hi);margin-bottom:5px;
  }
  .r-orient{
    display:inline-block;font-size:10.5px;letter-spacing:.18em;text-indent:.09em;
    border:1px solid var(--gold-dim);border-radius:4px;
    padding:2px 9px;color:var(--gold);margin-bottom:13px;
  }
  .r-block{margin-bottom:12px;}
  .r-block:last-child{margin-bottom:0;}
  .r-label{font-size:11px;letter-spacing:.2em;color:var(--lavender);margin-bottom:4px;}
  .r-text{font-size:13px;line-height:2;letter-spacing:.02em;color:var(--ink);}
  .r-text.logic{
    font-size:12.5px;color:var(--ink-dim);
    border-left:2px solid rgba(179,160,224,.4);
    padding-left:10px;
  }

  /* 総合リーディング */
  .synth{
    border:1px solid rgba(179,160,224,.35);
    border-radius:12px;
    background:linear-gradient(170deg, rgba(179,160,224,.06), rgba(255,255,255,.015));
    padding:18px 16px 20px;
    margin:22px 0 6px;
  }
  .synth-title{
    text-align:center;margin-bottom:14px;
  }
  .synth-title .en{
    font-family:'Cormorant Garamond',serif;font-size:10px;
    letter-spacing:.4em;text-indent:.4em;color:var(--lavender);
  }
  .synth-title .jp{
    display:block;margin-top:5px;font-size:14px;font-weight:600;
    letter-spacing:.2em;text-indent:.2em;
  }
  .synth .fact{
    display:flex;gap:10px;align-items:baseline;
    font-size:12.5px;line-height:1.9;color:var(--ink);
    margin-bottom:8px;
  }
  .synth .fact .tag{
    flex:none;font-size:10px;letter-spacing:.14em;
    color:var(--gold);border:1px solid var(--gold-dim);border-radius:3px;
    padding:1px 7px;transform:translateY(-1px);
  }
  .synth .story{
    margin-top:14px;padding-top:13px;
    border-top:1px dashed rgba(179,160,224,.3);
    font-size:13px;line-height:2.05;color:var(--ink);
  }

  .actions{display:flex;flex-direction:column;gap:11px;margin-top:24px;align-items:center;}
  .actions button{
    width:min(100%,320px);padding:13px 0;border-radius:999px;
    font-size:12.5px;letter-spacing:.24em;text-indent:.24em;
    cursor:pointer;transition:opacity .3s, background .3s;
  }
  #copyBtn{
    background:linear-gradient(135deg, #b28a45, #d9b268);
    border:none;color:#160f2e;font-weight:600;
  }
  #copyBtn:active{opacity:.85;}
  #againBtn{background:transparent;border:1px solid var(--gold-dim);color:var(--gold-hi);}
  #againBtn:active{background:rgba(201,163,90,.12);}
  #copyDone{
    font-size:11px;letter-spacing:.12em;color:var(--lavender);
    opacity:0;transition:opacity .5s;min-height:1.2em;
  }
  #copyDone.show{opacity:1;}
  .sheet-foot{
    text-align:center;margin-top:26px;
    font-family:'Cormorant Garamond',serif;
    font-size:9.5px;letter-spacing:.4em;text-indent:.4em;
    color:rgba(236,230,216,.28);
  }

  /* 折りたたみ時に再表示するボタン */
  #reopen{
    position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));
    transform:translateX(-50%);z-index:25;
    background:rgba(15,10,36,.85);border:1px solid var(--gold-dim);
    border-radius:999px;padding:10px 30px;
    color:var(--gold-hi);font-size:12px;letter-spacing:.26em;text-indent:.26em;
    cursor:pointer;opacity:0;pointer-events:none;transition:opacity .5s;
  }
  #reopen.show{opacity:1;pointer-events:auto;}

  @media (min-width:700px){
    #tableWrap{bottom:-34vh;}
    #fan{bottom:12vh;}
    #dealer{top:7%;}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01s !important;transition-duration:.01s !important;}
  }
</style>
</head>
<body>

<div id="stage">
  <div id="stars"></div>
  <div class="house">OMASU TAROT · FULL DECK 78</div>
  <div id="ribbon"></div>

  <div id="dealer" aria-hidden="true">
    <div class="d-body"></div>
    <div class="d-hood"></div>
  </div>

  <div id="tableWrap">
    <div class="table-rim"></div>
    <div class="candle left"></div>
    <div class="candle right"></div>
  </div>

  <div id="slots">
    <div class="slot" data-pos="past">
      <div class="frame"></div>
      <div class="pos-label"><span class="jp">過去</span><span class="en">Past</span></div>
    </div>
    <div class="slot" data-pos="present">
      <div class="frame"></div>
      <div class="pos-label"><span class="jp">現在</span><span class="en">Present</span></div>
    </div>
    <div class="slot" data-pos="future">
      <div class="frame"></div>
      <div class="pos-label"><span class="jp">未来</span><span class="en">Future</span></div>
    </div>
  </div>

  <div id="fan"></div>

  <div id="intro">
    <div>
      <div class="en-title">Past / Present / Future</div>
      <h1>三枚引きタロット</h1>
    </div>
    <p>大アルカナと小アルカナ、78枚すべてのカードから<br>過去・現在・未来の三枚を引きます。<br>カードの意味と、三枚の構成の両方から読み解きます。</p>
    <div class="tap">テーブルに触れてはじめる</div>
  </div>
</div>

<button id="reopen">結果を見る</button>

<div id="sheet" role="dialog" aria-label="鑑定結果">
  <div class="sheet-handle" id="sheetHandle" title="たたむ"></div>
  <div class="sheet-body">
    <div class="sheet-inner">
      <div class="sheet-head">
        <div class="en">Reading</div>
        <h2>三枚の読み解き</h2>
      </div>
      <div id="readings"></div>
      <div id="synthesis"></div>
      <div class="actions">
        <button id="copyBtn">テキストをコピー</button>
        <div id="copyDone"></div>
        <button id="againBtn">もう一度引く</button>
      </div>
      <div class="sheet-foot">OMASU TAROT</div>
    </div>
  </div>
</div>

<script>
const MAJORS = [
{no:"0",name:"愚者",en:"The Fool",symbol:"❂",kw:"出発",
 up:{core:"まだ形になっていないものに、足が向いています。計画の完成度より、動き出したという事実のほうが意味を持つときです。",
     guide:"準備が六割でも、最初の一歩は踏み出せます。細部は歩きながら整えるつもりで、身軽さを保ってください。",
     aff:"私は、身軽なまま新しい道を歩きはじめます。"},
 rev:{core:"動きたい気持ちと、足元への不安が同居しています。無計画さが、自由ではなく迷いとして出やすいときです。",
     guide:"いったん立ち止まり、持っている荷物の中身を確認するタイミングです。捨てるものを一つ決めるだけで、次の一歩は軽くなります。",
     aff:"私は、立ち止まる時間にも意味があると知っています。"}},
{no:"I",name:"魔術師",en:"The Magician",symbol:"✦",kw:"創造",
 up:{core:"必要な道具は、すでに手元にそろっています。足りないのは材料ではなく、使いはじめる合図だけです。",
     guide:"頭の中の構想を、今日ひとつだけ目に見える形にしてください。企画の一行でも、最初の連絡でもかまいません。",
     aff:"私は、いま持っているもので始められます。"},
 rev:{core:"力はあるのに、出しどころが定まっていません。器用さが、あちこちに散る形で使われている気配があります。",
     guide:"やることを絞る勇気が要る時期です。一番手応えのあるものを一つ選び、他はいったん保留にしてください。",
     aff:"私は、自分の力の注ぎ先を自分で選びます。"}},
{no:"II",name:"女教皇",en:"The High Priestess",symbol:"☽",kw:"直感",
 up:{core:"答えは外ではなく、すでに自分の内側にあります。騒がしい情報から離れるほど、輪郭がはっきりしてきます。",
     guide:"即断しないことが、いまは正解です。ひと晩置く、一人の時間を作る、そのあいだに直感が整理をしてくれます。",
     aff:"私は、静けさの中の声を聞き分けられます。"},
 rev:{core:"感じてはいるのに、見ないふりをしていることがありそうです。あるいは、勘に頼りすぎて確認を飛ばしている可能性もあります。",
     guide:"直感と思い込みを仕分けてください。紙に書き出して、根拠のあるものと気分だけのものを分けると、視界が晴れます。",
     aff:"私は、感じたことを正直に見つめます。"}},
{no:"III",name:"女帝",en:"The Empress",symbol:"❀",kw:"実り",
 up:{core:"育ててきたものが、実りに向かっています。奪い合わなくても満ちてくる、そういう循環の中にいます。",
     guide:"効率より、心地よさを基準にしてください。休息も食事も環境も、自分を丁寧に扱うことがそのまま成果につながる時期です。",
     aff:"私は、受け取ることを自分に許します。"},
 rev:{core:"与えすぎか、受け取らなすぎか、どちらかに傾いています。世話を焼くことで、自分を後回しにしていないでしょうか。",
     guide:"まず自分の器を満たすことから始めてください。順番が変わるだけで、同じ行動でも消耗が癒しに変わります。",
     aff:"私は、自分を満たすことに罪悪感を持ちません。"}},
{no:"IV",name:"皇帝",en:"The Emperor",symbol:"♦",kw:"構築",
 up:{core:"感覚ではなく、構造で物事を支える局面です。ルールや計画といった骨組みが、あなたの味方になります。",
     guide:"決める役割から逃げないでください。境界線と期限を自分で引くと、周囲の景色まで整理されていきます。",
     aff:"私は、自分の領域を自分で治めます。"},
 rev:{core:"支配とコントロールの匙加減が崩れています。固くなりすぎているか、誰かの固さに窮屈さを感じているかもしれません。",
     guide:"正しさで押し切る前に、そのルールが今も機能しているかを確認してください。骨組みは、作り直してよいものです。",
     aff:"私は、強さと柔らかさを両方使えます。"}},
{no:"V",name:"法王",en:"The Hierophant",symbol:"⚭",kw:"学び",
 up:{core:"我流よりも、すでにある知恵が効く場面です。先人のやり方や正攻法の中に、いま必要なヒントがあります。",
     guide:"信頼できる人に教わる、基本に立ち返る、その素直さが近道になります。相談する相手は、実績で選んでください。",
     aff:"私は、学ぶ姿勢を持ち続けます。"},
 rev:{core:"常識やしきたりが、支えではなく縛りになりかけています。「こうあるべき」の出どころを疑ってよいときです。",
     guide:"型を破る前に、どの型に従ってきたのかを言葉にしてください。手放すルールを選べれば、残したルールは力になります。",
     aff:"私は、自分に合う教えを自分で選びます。"}},
{no:"VI",name:"恋人",en:"The Lovers",symbol:"❦",kw:"選択",
 up:{core:"心が惹かれる方向と、進むべき方向が一致しつつあります。損得を超えて「好き」が判断材料になってよいときです。",
     guide:"迷ったら、心が軽くなるほうを選んでください。この時期の直感的な選択には、あとから理屈がついてきます。",
     aff:"私は、心が動くほうを信じて選びます。"},
 rev:{core:"決めきれない状態が続いています。どちらも選ばないことで、一番望まないはずの現状維持を選び続けているかもしれません。",
     guide:"選択肢を眺める時間は、もう十分です。期限を切って、選ばなかったほうをきちんと手放す準備をしてください。",
     aff:"私は、選ぶことで前に進みます。"}},
{no:"VII",name:"戦車",en:"The Chariot",symbol:"➤",kw:"前進",
 up:{core:"迷いより勢いが勝っている、追い風の局面です。多少の障害なら、いまの推進力で乗り越えられます。",
     guide:"考えすぎる前に着手してください。ただしハンドルは握ったまま。速度と方向の両方を自分で持つのが条件です。",
     aff:"私は、自分の意志で進路を決めて進みます。"},
 rev:{core:"アクセルとブレーキを同時に踏んでいるような状態です。焦りだけが空転して、消耗が先に来ています。",
     guide:"速度を落とすことは、負けではありません。行き先の確認さえ済めば、同じ力がまっすぐ前進に変わります。",
     aff:"私は、進む力と止まる力を両方持っています。"}},
{no:"VIII",name:"力",en:"Strength",symbol:"∞",kw:"調律",
 up:{core:"力ずくではなく、なだめて味方につける強さが働いています。焦りや衝動と、うまく共存できているときです。",
     guide:"感情を抑え込むのではなく、手なずけるイメージで。時間をかけて信頼を積む姿勢が、一番の近道になります。",
     aff:"私は、穏やかさの中に強さを持っています。"},
 rev:{core:"自信が揺らぐか、逆に力みすぎるか、振れ幅が大きくなっています。抑えようとするほど、暴れる何かがありそうです。",
     guide:"今日は勝とうとしないでください。整えるだけの日を一日はさむと、握る力が戻ってきます。",
     aff:"私は、弱さを認められる強さがあります。"}},
{no:"IX",name:"隠者",en:"The Hermit",symbol:"🏮",kw:"内省",
 up:{core:"外の評価から離れて、自分の内側を照らす時期に入っています。一人の時間が、いちばん濃い学びになります。",
     guide:"答えを人に求めず、自分の記録を読み返してください。過去の自分が残したものの中に、灯りになる一行があります。",
     aff:"私は、一人の時間を恐れません。"},
 rev:{core:"内省が孤立に、慎重さが停滞に変わりかけています。籠もることが目的になっていないか、確認したいところです。",
     guide:"完全に閉じる前に、一つだけ窓口を残してください。深く潜るためにこそ、戻る場所の確保が必要です。",
     aff:"私は、閉じる時期と開く時期を選べます。"}},
{no:"X",name:"運命の輪",en:"Wheel of Fortune",symbol:"☸",kw:"転機",
 up:{core:"自分の努力とは別の次元で、状況が動きはじめています。巡ってきた流れに乗ること自体が、いまの実力です。",
     guide:"チャンスは、検討している間に回転していきます。多少不格好でも、来た波には手を挙げて乗ってください。",
     aff:"私は、巡ってきた流れを受け取ります。"},
 rev:{core:"思い通りに進まないのは、力不足ではなくタイミングの問題です。歯車が噛み合うまでの、待ち時間にいます。",
     guide:"いま無理にこじ開けないでください。次の回転までに準備を整えた人だけが、好転を好機にできます。",
     aff:"私は、待つ時間を準備の時間に変えます。"}},
{no:"XI",name:"正義",en:"Justice",symbol:"⚖",kw:"均衡",
 up:{core:"筋を通すことが、最終的に一番の得になる局面です。感情ではなく事実で判断する冷静さが働いています。",
     guide:"曖昧にしてきた約束や条件を、この機会に文字にしてください。フェアであることが、あなたの立場を強くします。",
     aff:"私は、誠実さを自分の軸にします。"},
 rev:{core:"どこかに偏りや不公平が紛れ込んでいます。自分に厳しすぎるか、誰かに甘すぎるか、天秤が傾いています。",
     guide:"白黒つける前に、材料がそろっているかを確認してください。片方の言い分だけで裁かない慎重さが要ります。",
     aff:"私は、自分にも他人にも公平であろうとします。"}},
{no:"XII",name:"吊るされた男",en:"The Hanged Man",symbol:"⇅",kw:"視点転換",
 up:{core:"動けないことが、そのまま学びになっている時期です。視点を逆さにすると、行き詰まりは仕込みの時間に変わります。",
     guide:"いまの我慢が誰のため・何のためかを言葉にしてください。意味づけができた忍耐は、消耗ではなく投資になります。",
     aff:"私は、この停滞の意味を自分で見つけます。"},
 rev:{core:"実りのない我慢を続けている可能性があります。犠牲を払うこと自体に、慣れてしまっていないでしょうか。",
     guide:"その忍耐に回収の見込みがあるか、一度そろばんを弾いてください。降りる決断もまた、視点の転換です。",
     aff:"私は、手放してよい我慢を見分けます。"}},
{no:"XIII",name:"死神",en:"Death",symbol:"✝",kw:"終わりと再生",
 up:{core:"一つのサイクルが、はっきりと終わりに向かっています。惜しさより、終わらせる腕前が問われるときです。",
     guide:"中途半端に延命させないでください。きちんと締めくくったものだけが、次の始まりの土台になります。",
     aff:"私は、終わらせる力を持っています。"},
 rev:{core:"もう機能していないものを、手放せずに抱えています。変化を先送りするほど、コストは静かに増えていきます。",
     guide:"全部を一度に捨てる必要はありません。今日、一番古い「もう要らないもの」を一つだけ終わらせてください。",
     aff:"私は、少しずつ手放すことができます。"}},
{no:"XIV",name:"節制",en:"Temperance",symbol:"♒",kw:"中庸",
 up:{core:"異なるものを混ぜ合わせて、ちょうどいい濃度を見つける調整力が働いています。極端に振れない安定感が強みです。",
     guide:"0か100かで考えず、配合を変えて試してください。仕事と休み、理性と感情, その比率の微調整が成果を変えます。",
     aff:"私は、自分にちょうどいい加減を知っています。"},
 rev:{core:"バランスが崩れて、どこかが過剰、どこかが不足になっています。し過ぎているものに、心当たりはないでしょうか。",
     guide:"まず過剰なほうを減らすことから始めてください。足すより引くほうが、いまは早く整います。",
     aff:"私は、過剰に気づいて手を緩められます。"}},
{no:"XV",name:"悪魔",en:"The Devil",symbol:"♆",kw:"執着",
 up:{core:"わかっているのにやめられない、その引力の正体と向き合うときです。鎖は、実は自分で外せる緩さで掛かっています。",

 rev:{core:"長く縛られていたものから、離れられる兆しが出ています。執着の力が、少し緩んできました。",

{no:"XVI",name:"塔",en:"The Tower",symbol:"⚡",kw:"刷新",

 rev:{core:"限界が来ているのに、崩壊を先延ばしにしている気配があります。小さなひび割れのサインが、続いていないでしょうか。",

{no:"XVII",name:"星",en:"The Star",symbol:"✶",kw:"希望",

 rev:{core:"希望が漠然としすぎて、力になっていない状態です。あるいは理想が高すぎて、現在地との落差に疲れています。",

{no:"XVIII",name:"月",en:"The Moon",symbol:"☾",kw:"潜在意識",

 rev:{core:"霧が晴れはじめています。ずっと曖昧だったものの正体が、少しずつ見えてくる時期です。",

{no:"XIX",name:"太陽",en:"The Sun",symbol:"☀",kw:"肯定",

 rev:{core:"力はあるのに、光の量が足りていません。自信の曇りや環境の陰が、本来の明るさを遮っています。",

{no:"XX",name:"審判",en:"Judgement",symbol:"♪",kw:"再起",

 rev:{core:"過去への未練と、再起のサインを混同しやすいときです。呼ばれている気がするだけの、残響もあります。",

{no:"XXI",name:"世界",en:"The World",symbol:"◎",kw:"完成",
 up:{core:"一つの物語が、きれいに円を描いて閉じようとしています。足りないピースは、もうほとんどありません。",

// 78枚のデッキを構築
function buildDeck() {
  deck = [];
  
  // 1. 大アルカナを追加
  MAJORS.forEach(m => {
    deck.push({
      type: "major",
      no: m.no,
      name: m.name,
      en: m.en,
      symbol: m.symbol,
      kw: m.kw,
      up: m.up,
      rev: m.rev
    });
  });

  // 2. 小アルカナを追加
  for (const suitKey in SUITS) {
    const suit = SUITS[suitKey];
    RANKS.forEach((rank, idx) => {
      const core = MINOR_CORE[suitKey][idx];
      const name = `${suit.jp}の${rank.jp}`;
      
      // 英語表示名の整形 (A, 2..10, Page, Knight, Queen, King)
      let enDisp = rank.disp;
      if (rank.v === 1) enDisp = "Ace";
      else if (rank.v === 11) enDisp = "Page";
      else if (rank.v === 12) enDisp = "Knight";
      else if (rank.v === 13) enDisp = "Queen";
      else if (rank.v === 14) enDisp = "King";
      const enName = `${enDisp} of ${suitKey.charAt(0).toUpperCase() + suitKey.slice(1)}s`;

      // アファメーションの割り当て
      const affUp = suit.affUp[idx % suit.affUp.length];
      const affRev = suit.affRev[idx % suit.affRev.length];

      deck.push({
        type: "minor",
        no: rank.disp,
        name: name,
        en: enName,
        symbol: suit.sym,
        kw: rank.kw,
        up: {
          core: core.up,
          guide: `${rank.act} ${suit.up2}`,
          aff: affUp
        },
        rev: {
          core: core.rev,
          guide: `${rank.act} ${suit.rev2}`,
          aff: affRev
        }
      });
    });
  }
}

// 山札（扇状）のレンダリング
function renderFan() {
  const fan = document.getElementById('fan');
  fan.innerHTML = '';
  const fanCount = 22; // 見栄えの良い枚数を展開
  for (let i = 0; i < fanCount; i++) {
    const card = document.createElement('div');
    card.className = 'fan-card';
    
    // 扇状に並べるための角度と半径の計算
    const angle = ((i / (fanCount - 1)) - 0.5) * 76; // -38deg から 38deg
    card.style.setProperty('--a', `${angle}deg`);
    card.style.setProperty('--r', `clamp(180px, 45vh, 250px)`);
    
    setTimeout(() => {
      card.classList.add('in');
    }, i * 30);

    card.addEventListener('click', () => {
      if (step < 3) {
        card.classList.add('picked');
        drawCard(card);
      }
    });

    fan.appendChild(card);
  }
}

// メッセージリボンの表示
function showRibbon(text) {
  const ribbon = document.getElementById('ribbon');
  ribbon.textContent = text;
  ribbon.classList.add('show');
}

// カードを引く処理
function drawCard(fanCardEl) {
  const positions = ["past", "present", "future"];
  const currentPos = positions[step];
  
  // デッキからランダムに1枚引く
  const randomIndex = Math.floor(Math.random() * deck.length);
  const selectedCard = deck.splice(randomIndex, 1)[0];
  
  // 正逆の判定 (50%)
  const isReversed = Math.random() < 0.5;

  drawnCards.push({
    card: selectedCard,
    isReversed: isReversed,
    pos: currentPos
  });

  // スロットにカードを流し込む
  const slotEl = document.querySelector(`.slot[data-pos="${currentPos}"]`);
  const frameEl = slotEl.querySelector('.frame');
  slotEl.classList.add('filled');

  // カードHTMLエレメントの構築
  const cardEl = document.createElement('div');
  cardEl.className = 'card';
  if (isReversed) {
    cardEl.classList.add('rev');
  }

  cardEl.innerHTML = `
    <div class="card-inner">
      <div class="face back"><span class="back-moon">☽</span></div>
      <div class="face front">
        <div class="front-body">
          <span class="front-num">${selectedCard.no}</span>
          <span class="front-symbol">${selectedCard.symbol}</span>
          <span class="front-name">${selectedCard.name.replace("の", "<br>")}</span>
        </div>
      </div>
    </div>
  `;

  frameEl.appendChild(cardEl);
  
  // landedアニメーション開始
  setTimeout(() => {
    cardEl.classList.add('landed');
  }, 50);

  // カードオープンイベント
  cardEl.addEventListener('click', () => {
    if (!cardEl.classList.contains('open')) {
      cardEl.classList.add('open');
      checkAllOpen();
    }
  });

  // 次のステップへ
  step++;
  if (step === 1) {
    showRibbon("カードを1枚選んでください（現在）");
  } else if (step === 2) {
    showRibbon("カードを1枚選んでください（未来）");
  } else {
    showRibbon("カードをタップしてめくってください");
    // 山札を片付ける
    document.querySelectorAll('.fan-card:not(.picked)').forEach(el => {
      el.classList.add('gone');
    });
  }
}

// すべてオープンされたか判定

  if (openCount === 3) {
    setTimeout(() => {

      showSheet();
    }, 1200);
  }
}

        </div>
        
        <div class="r-block">
          <div class="r-label">おますのアドバイス</div>
          <div class="r-text logic">${data.guide}</div>
        </div>
        
        <div class="r-block">
          <div class="r-label">今日のアファメーション</div>
          <div class="r-text">「${data.aff}」</div>
        </div>
      </div>
    `;
    readingsDiv.insertAdjacentHTML('beforeend', html);
  });

  generateSynthesis();
}

// 総合リーディングの自動生成
function generateSynthesis() {
  const synthDiv = document.getElementById('synthesis');
  synthDiv.innerHTML = '';

  // 1. 特徴抽出
  let majorCount = 0;
  let reverseCount = 0;
  const suitCounts = { wand: 0, cup: 0, sword: 0, pent: 0 };
  
  drawnCards.forEach(item => {
    if (item.card.type === "major") majorCount++;
    if (item.isReversed) reverseCount++;
    
    // スート判定
    if (item.card.name.includes("ワンド")) suitCounts.wand++;
    if (item.card.name.includes("カップ")) suitCounts.cup++;
    if (item.card.name.includes("ソード")) suitCounts.sword++;
    if (item.card.name.includes("ペンタクル")) suitCounts.pent++;
  });

  // ファクトタグの生成
  let facts = [];
  if (majorCount >= 2) facts.push("大アルカナ中心");
  if (reverseCount >= 2) facts.push("内省・調整期");
  if (reverseCount === 0) facts.push("オール正位置");
  
  let maxSuit = "";
  let maxSuitCount = 0;
  for (const s in suitCounts) {
    if (suitCounts[s] > maxSuitCount) {
      maxSuitCount = suitCounts[s];
      maxSuit = s;
    }
  }
  if (maxSuitCount >= 2) {
    const suitJps = { wand: "アクション中心", cup: "感情・関係性重視", sword: "思考・整理のとき", pent: "現実的・継続重視" };
    facts.push(suitJps[maxSuit]);
  }

  // 総合ストーリーの生成
  let story = "";
  
  // 導入文
  if (majorCount >= 2) {
    story += "今回、大アルカナが多く出現しています。これは現在、おますさんの人生において、一時的な出来事というよりは、根本的な意識の変容や大きなテーマの切り替わりの中にいることを示しています。";
  } else {
    story += "小アルカナが中心の構成です。これは日々の具体的な行動、思考の整理、あるいは身近な人間関係といった、地に足のついた現実的な事柄にこそ、今をひらく鍵があることを告げています。";
  }

  // 正逆の傾向
  if (reverseCount === 3) {
    story += " 3枚すべてのカードが逆位置で出ています。これは、外に向かって無理にエネルギーを放出するよりも、意識を完全に内側へと向け、過去の整理や自己理解に時間を割くべき「静かなメンテナンス期」であることを表しています。焦る必要はありません。";
  } else if (reverseCount === 2) {
    story += " 逆位置が多めの展開です。現在起きている停滞感や迷いは、悪いことではなく「微調整のサイン」です。アクセルを踏み直す前に、余計なこだわりや荷物を減らしていくと、結果的にスムーズに動き出せるでしょう。";
  } else if (reverseCount === 0) {
    story += " すべてのカードが正位置で揃っています。これはエネルギーの流れが非常にスムーズで、目の前のチャンスや感情をまっすぐに受け入れられる、前向きな勢いがある状態を示しています。自信を持って進んで大丈夫です。";
  } else {
    story += " 正位置と逆位置がバランスよく交じり合っています。動くべき部分と、少し立ち止まって見直すべき部分が共存しています。自分の心と現実のズレを丁寧にすり合わせていくプロセス自体が、実りへとつながります。";
  }

  // スート別メッセージ
  if (maxSuitCount >= 2) {
    if (maxSuit === "wand") {
      story += " 特に「ワンド」のエネルギーが強く、意志の力や新たな挑戦へのパッションが高まっています。まずは直感的に面白そうと感じたことに小さく着手し、情熱を形に変えていくアクションを優先してください。";
    } else if (maxSuit === "cup") {
      story += " 「カップ」のカードが中心です。いまは理屈での判断や損得よりも、「自分がどう感じるか」「心が満たされているか」という感情のセンサーや、大切な人との調和を一番の基準にすると良い時期です。";
    } else if (maxSuit === "sword") {
      story += " 「ソード」が多めに出ており、頭の冴えや決断力がテーマになります。現状をロジカルに分析し、不要な関係や思考を言葉にしてはっきりと「切り分ける」ことで、頭の中の霧がすっきりと晴れていくはずです。";
    } else if (maxSuit === "pent") {
      story += " 「ペンタクル」の安定感が際立っています。一足飛びの成功を求めるのではなく、今日のルーティン、健康管理、実務的な作業をコツコツとこなすことが最大の防御であり、最も確実な前進につながります。";
    }
  }

  // 結び
  story += "<br><br>過去から受け取ったバトンを現在でどう繋ぎ、どんな未来を創造したいか。カードたちの知恵をお守りにして、今日という一日を心地よくデザインしていきましょう。おますはいつでも応援しています。";

  // HTMLのレンダリング
  let factHtml = '';
  facts.forEach(f => {
    factHtml += `<div class="fact"><span class="tag">構成</span>${f}</div>`;
  });

  const html = `
    <div class="synth">
      <div class="synth-title">
        <span class="en">Synthesis</span>
        <span class="jp">総合リーディング</span>
      </div>
      ${factHtml}
      <div class="story">${story}</div>
    </div>
  `;
  synthDiv.innerHTML = html;
}

// 鑑定結果シートの表示・非表示制御
function showSheet() {
  document.getElementById('sheet').classList.add('show');
  document.getElementById('reopen').classList.remove('show');
}
function hideSheet() {
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('reopen').classList.add('show');
}

function setupReopen() {
  const reopenBtn = document.getElementById('reopen');
  reopenBtn.addEventListener('click', showSheet);

  const handle = document.getElementById('sheetHandle');
  handle.addEventListener('click', hideSheet);

  // コピー機能
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.addEventListener('click', copyReadingText);

  // もう一度引く機能
  const againBtn = document.getElementById('againBtn');
  againBtn.addEventListener('click', resetTarot);
}

// クリップボードへコピー
function copyReadingText() {
  const posJps = { past: "過去", present: "現在", future: "未来" };
  let text = `🔮 【三枚引きタロット鑑定結果】 🔮\n`;
  text += `OMASU TAROT ─ 78枚フルデッキ\n\n`;

  drawnCards.forEach(item => {
    const c = item.card;
    const orientText = item.isReversed ? "逆位置" : "正位置";
    const data = c[item.isReversed ? "rev" : "up"];
    
    text += `■ ${posJps[item.pos]}：${c.name} (${orientText})\n`;
    text += `  キーワード：${c.kw}\n`;
    text += `  カードが示すもの：${data.core}\n`;
    text += `  おますのアドバイス：${data.guide}\n`;
    text += `  アファメーション：「${data.aff}」\n\n`;
  });

  const storyEl = document.querySelector('.synth .story');
  if (storyEl) {
    // HTML改行をテキスト改行へ
    const storyText = storyEl.innerHTML.replace(/<br\s*\/?>/gi, '\n');
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = storyText;
    
    text += `【総合リーディング】\n`;
    text += tempDiv.textContent.trim() + `\n\n`;
  }
  
  text += `✨ OMASU TAROT ✨`;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopySuccess).catch(copyFallback);
  } else {
    copyFallback(text);
  }
}

function showCopySuccess() {
  const copyDone = document.getElementById('copyDone');
  copyDone.textContent = "コピーしました！";
  copyDone.classList.add('show');
  setTimeout(() => {
    copyDone.classList.remove('show');
  }, 2000);
}

function copyFallback(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showCopySuccess();
  } catch (err) {
    alert("コピーに失敗しました。お手数ですが、テキストを選択してコピーしてください。");
  }
  document.body.removeChild(textarea);
}

// リセット処理
function resetTarot() {
  // スロットをクリア
  const slots = document.querySelectorAll('.slot');
  slots.forEach(slot => {
    slot.classList.remove('filled');
    const frame = slot.querySelector('.frame');
    frame.innerHTML = '';
  });

  // 鑑定シートを閉じる
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('reopen').classList.remove('show');

  // 変数初期化
  drawnCards = [];
  step = 0;
  buildDeck(); // デッキのリビルド（シャッフルし直すため）

  // 山札を再描画
  showRibbon("カードを1枚選んでください（過去）");
  renderFan();
}
